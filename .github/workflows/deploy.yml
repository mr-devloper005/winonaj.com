name: Build And Deploy WinonajCom VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_REF: ghcr.io/mr-devloper005/winonaj.com:latest
      REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write production env
        env:
          APP_ENV_PRODUCTION: ${{ secrets.APP_ENV_PRODUCTION }}
        run: |
          set -euo pipefail
          printf '%s' "$APP_ENV_PRODUCTION" > .env
          while IFS='=' read -r key value; do
            case "$key" in
              NEXT_PUBLIC_MASTER_PANEL_URL|NEXT_PUBLIC_MASTER_API_URL|NEXT_PUBLIC_SITE_CODE|NEXT_PUBLIC_FEED_REVALIDATE_SECONDS|NEXT_PUBLIC_SITE_NAME|NEXT_PUBLIC_SITE_TAGLINE|NEXT_PUBLIC_SITE_DESCRIPTION|NEXT_PUBLIC_SITE_DOMAIN|NEXT_PUBLIC_SITE_URL|NEXT_PUBLIC_SITE_OG_IMAGE)
                printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
                ;;
            esac
          done < .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push optimized image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/mr-devloper005/winonaj.com:latest
            ghcr.io/mr-devloper005/winonaj.com:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_MASTER_PANEL_URL=${{ env.NEXT_PUBLIC_MASTER_PANEL_URL }}
            NEXT_PUBLIC_MASTER_API_URL=${{ env.NEXT_PUBLIC_MASTER_API_URL }}
            NEXT_PUBLIC_SITE_CODE=${{ env.NEXT_PUBLIC_SITE_CODE }}
            NEXT_PUBLIC_FEED_REVALIDATE_SECONDS=${{ env.NEXT_PUBLIC_FEED_REVALIDATE_SECONDS }}
            NEXT_PUBLIC_SITE_NAME=${{ env.NEXT_PUBLIC_SITE_NAME }}
            NEXT_PUBLIC_SITE_TAGLINE=${{ env.NEXT_PUBLIC_SITE_TAGLINE }}
            NEXT_PUBLIC_SITE_DESCRIPTION=${{ env.NEXT_PUBLIC_SITE_DESCRIPTION }}
            NEXT_PUBLIC_SITE_DOMAIN=${{ env.NEXT_PUBLIC_SITE_DOMAIN }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SITE_OG_IMAGE=${{ env.NEXT_PUBLIC_SITE_OG_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy image on VPS without building
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_ENV_PRODUCTION: ${{ secrets.APP_ENV_PRODUCTION }}
          REPO_NAME: ${{ env.REPO_NAME }}
          IMAGE_REF: ${{ env.IMAGE_REF }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 12m
          envs: APP_ENV_PRODUCTION,REPO_NAME,IMAGE_REF,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            APP_ROOT="/opt/automation-sites"
            APP_DIR="$APP_ROOT/$REPO_NAME"
            mkdir -p "$APP_ROOT"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "git@github.com:mr-devloper005/$REPO_NAME.git" "$APP_DIR"
            fi
            cd "$APP_DIR"
            printf '%s' "$APP_ENV_PRODUCTION" > .env
            chmod 600 .env
            git remote set-url origin "git@github.com:mr-devloper005/$REPO_NAME.git" 2>/dev/null || true
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; then
              printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            docker compose -f docker-compose.vps.yml pull
            docker compose -f docker-compose.vps.yml up -d --no-build --remove-orphans
            docker compose -f docker-compose.vps.yml ps
